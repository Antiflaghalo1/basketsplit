name: Kroger Sweep
on:
  schedule:
    - cron: '0 8 * * 3'  # Wednesdays 8am UTC (after Stater Bros)
    - cron: '0 8 * * 6'  # Saturdays 8am UTC (after Stater Bros)
    - cron: '0 8 * * 1'  # Mondays 8am UTC
  workflow_dispatch:
jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Kroger sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          KROGER_CLIENT_ID: ${{ secrets.KROGER_CLIENT_ID }}
          KROGER_CLIENT_SECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: node scripts/kroger-sweep.cjs

      - name: Log completion
        run: echo "✅ Kroger sweep completed at $(date)"
