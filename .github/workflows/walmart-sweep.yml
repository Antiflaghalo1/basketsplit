name: Walmart Sweep

on:
  schedule:
    - cron: '0 5 * * 3'  # Wednesdays 5am UTC (after Flipp, before Costco)
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js ws

      - name: Run Walmart sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/walmart-sweep.cjs

      - name: Log completion
        run: echo "✅ Walmart sweep completed at $(date)"
