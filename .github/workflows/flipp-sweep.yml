name: Flipp Circular Sweep

on:
  schedule:
    - cron: '0 2 * * 3'
  workflow_dispatch:

jobs:
  sweep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run Flipp sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/flipp-sweep.js

      - name: Log completion
        run: echo "✅ Flipp sweep completed at $(date)"
